name: Bicho_Full2

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend - Build e Lint
    runs-on: ubuntu-latest

    if: contains(github.event.head_commit.message, '') || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        run: npm ci

      - name: Rodar lint
        run: npm run lint

      - name: Gerar build
        run: npm run build

  backend:
    name: Backend - Testes
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: bichofull_test
          MYSQL_USER: github
          MYSQL_PASSWORD: github
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: mysql+pymysql://github:github@127.0.0.1:3306/bichofull_test
      SECRET_KEY: github_actions_secret_key
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE: 30

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes
        run: pytest -v